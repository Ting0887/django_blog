{% load static %}
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{% static 'css/dropdown.css' %}">
<ul id="menu">
    <li>
        <a href="{% url 'main' %}">首頁</a>
    </li>
    <li>
        <a href="{% url 'about' %}">關於</a>
    </li>
    <li>
        <a href="{% url 'article' %}">文章列表</a>
    </li>
    {% if user.is_authenticated %}
    <li>
        <a>{{ request.user.username }}</a>
        <ul>
            <li>
                <a href="{% url 'account:profile' user.id %}">個人資料</a>
            </li>
            <li>
                <a href="{% url 'account:logout' %}">登出</a>
            </li>
        </ul>
    </li>
    {% else %}
    <li>
        <a href="{% url 'account:register' %}">註冊</a>
    </li>
    <li>
        <a href="{% url 'account:login' %}">登入</a>
    </li>
    {% endif %}
</ul>
