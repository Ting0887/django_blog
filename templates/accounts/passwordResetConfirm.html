{% extends "base.html" %}
{% load static %}
{% block heading %}密碼重設{% endblock %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/account.css' %}">
<div class="reset-password">
    <form method="POST" action="">
        {% csrf_token %}
        {% for field in form %}
            {{ field.errors }}
            {{ field.label_tag }}
            <p>{{ field }}</p>
        {% endfor %}
        <div class="reset-btn">
            <input type="submit" name="submit" value="重設密碼">
        </div>
    </form>
</div>
{% endblock %}
