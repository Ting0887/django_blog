{% extends 'base.html' %}
{% load static %}
{% block heading %}登入{% endblock %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/account.css' %}">
<div class="login">
    <form method='POST' action="{% url 'account:login' %}">
        {% csrf_token %}
        <p>使用者名稱:<input type="text" name="username"></p>
        <p>密碼:<input type="password" name="password"></p>
        {% if nextURL %}
            <input type="hidden" name="nextURL" value="{{ nextURL }}"></input>
        {% endif %}
        <p>
            <input class="login-btn" type="submit" value="送出">
        </p>
        <p>
            <a class="forgetpassword" href="{% url 'account:accounts/forgetPassword' %}">忘記密碼</a>
        </p>
    </form>
</div>
{% endblock %}
