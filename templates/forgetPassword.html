{% extends "base.html" %}
{% load static %}
{% block heading %}忘記密碼{% endblock %}
{% block content %}
<script src="{% static 'js/sendEmail.js' %}"></script>
<link rel="stylesheet" href="{% static 'css/account.css' %}">
<div class="reset_password">
    <form action="" method="POST" name="form">
        {% csrf_token %}
        <div class="forget-password-form">
            輸入電子郵件 : 
            {{ form.email }}
            <input type="submit" value="提交" onclick="showmessage()">
        </div>
        {% if message %}
        <div class="message">
            {{ message }}
        </div>
        {% endif %}
    </form>
</div>
{% endblock %}
