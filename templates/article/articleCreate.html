{% extends 'base.html' %}
{% load static %}

{% block heading %}
    {% if articleForm.instance.id %}    
        修改文章
    {% else %}
        新增文章
    {% endif %}
{% endblock %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/article.css' %}">
    {% if articleForm.instance.id %}
    <div class="form">
        <form class="update-article" method="POST" action="{% url 'articleUpdate' articleForm.instance.id %}">
        </form>
    </div>
    {% else %}
    <div class="form">
        <form class="create-article" method='POST', action="{% url 'articleCreate' %}">
            {% csrf_token %}
            {{ articleForm.as_p }}
            <input type="submit" value="送出">
            <a class="btn" href="{% url 'article' %}" >放棄</a>
        </form>
    </div>
    {% endif %}
{% endblock %}
